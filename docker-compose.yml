services:
  workspace:
    build:
      # Raiz do repo: o Dockerfile compila o unlarp-agent a partir de cli/
      context: .
      dockerfile: machine/Dockerfile
    container_name: workspace_machine
    privileged: true
    ports:
      - "2222:22"
    volumes:
      - workspace-data:/workspace
      - workspace-nix-store:/nix
      - workspace-home:/root
      - workspace-docker:/var/lib/docker
    restart: always

volumes:
  workspace-data:
    name: workspace-data
  workspace-nix-store:
    name: workspace-nix-store
  workspace-home:
    name: workspace-home
  workspace-docker:
    name: workspace-docker
